  --bg:#F8F5EF;--bg2:#FFFFFF;--bg3:#F0EDE6;--bg4:#E8EFF8;
  --blue:#6B8FB5;--blue-d:#5A7A9E;--blue-l:#E8F0F8;--blue-ll:#F0F5FB;
  --gold:#C9923A;--gold-d:#A97A2E;--gold-l:#FDF3E4;
  --text:#3C3A36;--text2:#7A7570;--text3:#B0ACA6;
  --ok:#7BAF78;--ok-l:#EDF6EC;--err:#C47A7A;--err-l:#FAF0F0;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.12);
  --sh:0 2px 12px rgba(0,0,0,0.06);--sh2:0 6px 28px rgba(0,0,0,0.09);
  --r:12px;--rs:8px;--rl:20px;--rxl:32px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:16px;line-height:1.65;min-height:100vh}
a{color:var(--blue);text-decoration:none}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
input,textarea{font-family:inherit;outline:none}
img{max-width:100%}

/* === BUTTONS === */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:var(--r);font-size:15px;font-weight:600;transition:all .18s;border:none}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue-d);transform:translateY(-1px);box-shadow:var(--sh)}
.btn-accent{background:var(--gold);color:#fff}
.btn-accent:hover{background:var(--gold-d);transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--blue);border:1.5px solid var(--blue)}
.btn-outline:hover{background:var(--blue-l)}
.btn-ghost{background:transparent;color:var(--text2);padding:10px 16px}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-lg{padding:16px 36px;font-size:17px;border-radius:var(--rl)}
.btn-sm{padding:8px 16px;font-size:13px;border-radius:var(--rs)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* === FORMS === */
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:14px;font-weight:500;color:var(--text2)}
.input{width:100%;padding:13px 16px;border:1.5px solid var(--border2);border-radius:var(--r);font-size:15px;color:var(--text);background:var(--bg2);transition:border-color .15s}
.input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(107,143,181,0.12)}
.input::placeholder{color:var(--text3)}

/* === CARDS === */
.card{background:var(--bg2);border-radius:var(--rl);box-shadow:var(--sh);border:1px solid var(--border)}
.card-p{padding:28px}

/* === NAV === */
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 5vw;height:68px;background:rgba(255,255,255,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.nav-logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:700;color:var(--text);text-decoration:none}
.nav-links{display:flex;align-items:center;gap:8px}
@media(max-width:600px){.nav-links .hide-mobile{display:none}}

/* === LANDING === */
.hero{min-height:90vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 5vw 60px;background:linear-gradient(160deg,#F8F5EF 0%,#EEF3FA 100%)}
.hero h1{font-size:clamp(32px,6vw,60px);font-weight:800;line-height:1.15;color:var(--text);max-width:720px;margin-bottom:20px;letter-spacing:-.02em}
.hero h1 span{color:var(--blue)}
.hero p{font-size:clamp(16px,2.2vw,20px);color:var(--text2);max-width:560px;margin-bottom:40px;line-height:1.7}
.hero-cta{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-bottom:60px}
.hero-preview{width:100%;max-width:560px;background:var(--bg2);border-radius:var(--rxl);box-shadow:var(--sh2);border:1px solid var(--border);padding:24px;text-align:left}
.preview-msg{padding:14px 18px;border-radius:18px;font-size:14px;line-height:1.7;margin-bottom:10px;max-width:85%}
.preview-j{background:var(--blue-ll);color:var(--text);border-top-left-radius:4px;font-family:Georgia,serif}
.preview-u{background:var(--gold-l);color:var(--text);border-top-right-radius:4px;margin-left:auto;font-size:13px}
.preview-ref{font-size:11px;color:var(--gold);margin-top:-4px;margin-bottom:14px;padding-left:2px}

.section{padding:80px 5vw}
.section-title{font-size:clamp(24px,4vw,36px);font-weight:700;text-align:center;margin-bottom:12px;letter-spacing:-.01em}
.section-sub{text-align:center;color:var(--text2);font-size:17px;max-width:520px;margin:0 auto 48px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px}
.feat-card{background:var(--bg2);border-radius:var(--rl);padding:28px;border:1px solid var(--border);box-shadow:var(--sh)}
.feat-icon{width:52px;height:52px;border-radius:14px;background:var(--blue-ll);display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-size:24px}
.feat-card h3{font-size:17px;font-weight:600;margin-bottom:8px}
.feat-card p{font-size:14px;color:var(--text2);line-height:1.65}

.steps{display:flex;flex-direction:column;gap:24px;max-width:600px;margin:0 auto}
.step{display:flex;gap:20px;align-items:flex-start}
.step-num{width:44px;height:44px;border-radius:50%;background:var(--blue);color:#fff;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step h3{font-size:17px;font-weight:600;margin-bottom:4px}
.step p{font-size:14px;color:var(--text2)}

.plans-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;max-width:860px;margin:0 auto}
.plan-card{background:var(--bg2);border-radius:var(--rl);padding:32px;border:1.5px solid var(--border);position:relative;transition:box-shadow .2s}
.plan-card.featured{border-color:var(--blue);box-shadow:0 0 0 3px rgba(107,143,181,0.12),var(--sh2)}
.plan-badge{position:absolute;top:-14px;left:50%;transform:translateX(-50%);background:var(--blue);color:#fff;font-size:12px;font-weight:600;padding:4px 16px;border-radius:20px;white-space:nowrap}
.plan-name{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:8px}
.plan-price{font-size:40px;font-weight:800;color:var(--text);line-height:1;margin-bottom:4px}
.plan-price span{font-size:16px;font-weight:400;color:var(--text2)}
.plan-desc{font-size:13px;color:var(--text2);margin-bottom:24px}
.plan-features{list-style:none;display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.plan-features li{display:flex;align-items:center;gap:10px;font-size:14px}
.plan-features li::before{content:"✓";color:var(--ok);font-weight:700;flex-shrink:0}

.faq{max-width:680px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
.faq-item{background:var(--bg2);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.faq-q{padding:18px 20px;font-weight:600;font-size:15px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.faq-a{padding:0 20px 18px;font-size:14px;color:var(--text2);line-height:1.7;display:none}
.faq-item.open .faq-a{display:block}
.faq-item.open .faq-arrow{transform:rotate(180deg)}
.faq-arrow{transition:transform .2s;color:var(--text3)}

footer{background:var(--text);color:rgba(255,255,255,0.6);text-align:center;padding:32px;font-size:13px}
footer a{color:rgba(255,255,255,0.7)}
footer strong{color:#fff}

/* === AUTH === */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,#F8F5EF 0%,#EEF3FA 100%)}
.auth-card{background:var(--bg2);border-radius:var(--rxl);box-shadow:var(--sh2);padding:44px 40px;width:100%;max-width:440px;border:1px solid var(--border)}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo svg{margin-bottom:8px}
.auth-logo h1{font-size:22px;font-weight:700}
.auth-logo p{font-size:13px;color:var(--text2);margin-top:4px}
.auth-tabs{display:flex;background:var(--bg3);border-radius:var(--r);padding:4px;margin-bottom:28px}
.auth-tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:600;border-radius:var(--rs);color:var(--text2);cursor:pointer;transition:all .15s}
.auth-tab.active{background:var(--bg2);color:var(--text);box-shadow:var(--sh)}
.auth-form{display:flex;flex-direction:column;gap:16px}
.auth-or{text-align:center;color:var(--text3);font-size:13px;margin:8px 0}
.auth-footer{text-align:center;font-size:13px;color:var(--text2);margin-top:20px}

/* === ONBOARDING === */
.ob-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
.ob-card{background:var(--bg2);border-radius:var(--rxl);box-shadow:var(--sh2);padding:48px 44px;width:100%;max-width:480px;text-align:center;border:1px solid var(--border)}
.ob-step-indicator{display:flex;justify-content:center;gap:8px;margin-bottom:36px}
.ob-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);transition:all .2s}
.ob-dot.active{background:var(--blue);width:24px;border-radius:4px}
.ob-icon{width:80px;height:80px;border-radius:24px;background:var(--blue-ll);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:40px}
.ob-card h2{font-size:24px;font-weight:700;margin-bottom:12px}
.ob-card p{color:var(--text2);font-size:15px;line-height:1.7;margin-bottom:32px}
.credit-pill{display:inline-flex;align-items:center;gap:8px;background:var(--gold-l);border:1px solid rgba(201,146,58,0.2);color:var(--gold-d);font-weight:600;padding:10px 20px;border-radius:var(--rl);font-size:15px;margin-bottom:16px}

/* === CHAT LAYOUT === */
.chat-app{display:flex;height:100vh;overflow:hidden;background:var(--bg)}
.sidebar{width:280px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:transform .25s}
.sidebar-header{padding:18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px}

.bubble-u{background:var(--blue);color:#fff;border-top-right-radius:4px;font-size:14px;font-family:inherit}
.bubble-ref{font-size:11.5px;color:var(--gold);padding:0 2px;font-family:system-ui,sans-serif}
.msg-actions{display:flex;gap:4px;padding:0 2px}
.msg-act-btn{background:transparent;border:none;padding:4px 8px;border-radius:6px;font-size:11px;color:var(--text3);cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s}
.msg-act-btn:hover{background:var(--bg3);color:var(--text2)}

.typing-wrap{display:flex;gap:12px;align-items:flex-start;max-width:720px;margin:0 auto;width:100%}
.typing-bubble{padding:14px 18px;background:var(--bg2);border:1px solid var(--border);border-radius:18px;border-top-left-radius:4px;box-shadow:var(--sh);display:flex;gap:5px;align-items:center}
.t-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);animation:td 1.3s infinite;opacity:.4}
.t-dot:nth-child(2){animation-delay:.2s}.t-dot:nth-child(3){animation-delay:.4s}
@keyframes td{0%,80%,100%{opacity:.3;transform:scale(.75)}40%{opacity:1;transform:scale(1)}}

.suggestions{padding:12px 20px 0;max-width:720px;margin:0 auto;width:100%}
.suggestions p{font-size:12px;color:var(--text3);margin-bottom:8px}
.sug-chips{display:flex;flex-wrap:wrap;gap:8px}
.sug-chip{padding:8px 14px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s}

.input-area{padding:16px 20px;border-top:1px solid var(--border);background:rgba(255,255,255,0.95);backdrop-filter:blur(8px)}

.chat-textarea{flex:1;border:none;background:transparent;font-size:15px;color:var(--text);resize:none;max-height:140px;min-height:24px;line-height:1.5;padding:2px 0}

.chat-textarea:focus{outline:none}
.input-btns{display:flex;gap:6px;align-items:flex-end;flex-shrink:0}
.inp-btn{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:none;transition:all .15s;flex-shrink:0}
.inp-mic{background:var(--bg3);border:1px solid var(--border2);color:var(--text2)}
.inp-mic:hover{background:var(--bg2);color:var(--text)}
.inp-mic.recording{background:var(--err);color:#fff;animation:pulse-r 1s infinite}
@keyframes pulse-r{0%,100%{box-shadow:0 0 0 0 rgba(196,122,122,.4)}50%{box-shadow:0 0 0 8px rgba(196,122,122,0)}}
.inp-send{background:var(--blue);color:#fff}
.inp-send:hover{background:var(--blue-d)}
.inp-send:disabled{background:var(--border2);color:var(--text3);cursor:not-allowed}

/* empty state */
.empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center}
.empty-icon{width:72px;height:72px;border-radius:22px;background:var(--gold-l);display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.empty-chat h2{font-size:22px;font-weight:700;margin-bottom:8px}
.empty-chat p{font-size:14px;color:var(--text2);max-width:340px;line-height:1.7}

/* === MODALS === */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border-radius:var(--rxl);box-shadow:0 20px 60px rgba(0,0,0,0.2);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;animation:slideUp .2s}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{padding:24px 28px 0;display:flex;justify-content:space-between;align-items:flex-start}
.modal-body{padding:20px 28px 28px;display:flex;flex-direction:column;gap:16px}
.modal h2{font-size:20px;font-weight:700}
.modal-close{background:transparent;border:none;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text2);cursor:pointer;font-size:18px;flex-shrink:0}
.modal-close:hover{background:var(--bg3)}

/* === PLANS PAGE === */
.plans-page{max-width:880px;margin:0 auto;padding:48px 20px}
.plans-page h1{font-size:32px;font-weight:800;text-align:center;margin-bottom:8px}
.plans-page>.sub{text-align:center;color:var(--text2);margin-bottom:40px}
.billing-toggle{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:36px}
.toggle-track{width:48px;height:26px;border-radius:13px;background:var(--border2);cursor:pointer;position:relative;transition:background .2s}
.toggle-track.on{background:var(--blue)}
.toggle-thumb{width:22px;height:22px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,0.2)}
.toggle-track.on .toggle-thumb{transform:translateX(22px)}
.save-badge{background:var(--ok-l);color:var(--ok);font-size:12px;font-weight:600;padding:3px 10px;border-radius:var(--rl)}

/* === PROFILE === */
.profile-page{max-width:600px;margin:0 auto;padding:48px 20px;display:flex;flex-direction:column;gap:24px}
.profile-section{background:var(--bg2);border-radius:var(--rl);border:1px solid var(--border);padding:24px}
.profile-section h3{font-size:16px;font-weight:600;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.profile-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px}
.profile-row:last-child{border-bottom:none}
.profile-row span:first-child{color:var(--text2)}
.plan-tag{display:inline-flex;align-items:center;gap:5px;background:var(--blue-l);color:var(--blue-d);font-size:12px;font-weight:600;padding:4px 12px;border-radius:var(--rl)}

/* === ADMIN === */
.admin-layout{display:flex;min-height:100vh}
.admin-sidebar{width:240px;background:var(--text);color:rgba(255,255,255,0.75);display:flex;flex-direction:column;flex-shrink:0}
.admin-logo{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,0.1);font-size:16px;font-weight:700;color:#fff;display:flex;align-items:center;gap:10px}
.admin-nav{padding:12px;flex:1}
.admin-nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--rs);font-size:14px;cursor:pointer;transition:all .15s;margin-bottom:2px;color:rgba(255,255,255,0.65)}
.admin-nav-item:hover{background:rgba(255,255,255,0.08);color:#fff}
.admin-nav-item.active{background:rgba(107,143,181,0.25);color:#fff}
.admin-nav-sep{font-size:10px;color:rgba(255,255,255,0.3);font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:12px 12px 4px;margin-top:8px}
.admin-main{flex:1;overflow-y:auto;background:var(--bg)}
.admin-topbar{padding:20px 28px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;gap:16px}
.admin-topbar h1{font-size:20px;font-weight:700;flex:1}
.admin-content{padding:28px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px}
.kpi-card{background:var(--bg2);border-radius:var(--rl);padding:20px 24px;border:1px solid var(--border)}
.kpi-label{font-size:12px;color:var(--text2);font-weight:500;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.kpi-value{font-size:32px;font-weight:800;color:var(--text);line-height:1}
.kpi-delta{font-size:12px;margin-top:6px}
.kpi-delta.up{color:var(--ok)}
.kpi-delta.down{color:var(--err)}
.data-table{background:var(--bg2);border-radius:var(--rl);border:1px solid var(--border);overflow:hidden}
.data-table-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.data-table-header h3{font-size:15px;font-weight:600}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px 16px;font-size:12px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);background:var(--bg3)}
td{padding:13px 16px;font-size:13px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:var(--rl);font-size:12px;font-weight:600}
.badge-ok{background:var(--ok-l);color:#4a8a47}
.badge-err{background:var(--err-l);color:#a05050}
.badge-blue{background:var(--blue-l);color:var(--blue-d)}
.badge-gold{background:var(--gold-l);color:var(--gold-d)}

/* misc */
.tag{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:3px 10px;border-radius:var(--rl)}
.section-bg{background:var(--bg3)}
.divider{height:1px;background:var(--border);margin:8px 0}
.text-center{text-align:center}
.text-sm{font-size:13px;color:var(--text2)}
.mt-8{margin-top:8px}
.credits-upgrade-modal .modal{max-width:440px}
.prayer-drawer{position:fixed;right:0;top:0;height:100%;width:360px;max-width:95vw;background:var(--bg2);border-left:1px solid var(--border);box-shadow:-4px 0 24px rgba(0,0,0,0.1);z-index:300;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s}
.prayer-drawer.open{transform:translateX(0)}
.prayer-drawer-header{padding:20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.prayer-drawer-header h2{font-size:17px;font-weight:700}
.prayer-list{flex:1;overflow-y:auto;padding:12px}
.prayer-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--r);cursor:pointer;transition:background .15s;border:1px solid transparent;margin-bottom:4px}

.prayer-item-icon{width:40px;height:40px;border-radius:12px;background:var(--gold-l);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}

.gospel-card{background:linear-gradient(135deg,var(--blue-ll),var(--gold-l));border:1px solid rgba(107,143,181,0.2);border-radius:var(--rl);padding:18px 20px;margin:12px;cursor:pointer;transition:box-shadow .2s}
.gospel-card:hover{box-shadow:var(--sh)}
.gospel-card-label{font-size:11px;font-weight:700;color:var(--blue-d);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.gospel-card-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}
.gospel-card-sub{font-size:12px;color:var(--text2)}
.lit-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:4px 12px;border-radius:var(--rl);background:var(--blue-ll);color:var(--blue-d);border:1px solid rgba(107,143,181,0.2)}

.av-jesus-img{
  width:100%;height:100%;
  background-image:var(--avatar-img);

}

<script>
// ============================================================
// STATE
// ============================================================
const S = {
  page: 'landing',
  subpage: 'dashboard',
  user: null,
  obStep: 0,
  conversations: [],
  activeConv: null,
  messages: [],
  hist: [],

  recording: false,

};

const FREE_CREDITS = 7;
const GUEST_LIMIT = 3; // messages before signup gate (then create account for 7 total)

const CONV_SUGGESTIONS = [
  "Como posso encontrar paz nos momentos difíceis?",
  "O que os textos sagrados dizem sobre o perdão?",
  "Como lidar com a ansiedade e o medo?",
  "Qual o significado do sofrimento na vida?",
  "Como fortalecer minha fé?"
];

// ============================================================
// ORAÇÕES
// ============================================================
const PRAYERS = {
  "Pai Nosso": {
    icon: "🙏",
    intro: "A oração que Eu mesmo ensinei aos meus discípulos, quando me pediram: 'Senhor, ensina-nos a orar.' — Lc 11,1",
    text: `Pai nosso que estais nos céus,
santificado seja o vosso nome;
venha a nós o vosso reino;
seja feita a vossa vontade,
assim na terra como no céu.
O pão nosso de cada dia nos dai hoje;
perdoai-nos as nossas ofensas,
assim como nós perdoamos
a quem nos tem ofendido;
e não nos deixeis cair em tentação,

    ref: "Mt 6,9-13 · Lc 11,2-4"
  },
  "Ave Maria": {
    icon: "🌹",
    intro: "A saudação do anjo Gabriel à minha mãe — e a vossa.",
    text: `Ave Maria, cheia de graça,

bendita sois vós entre as mulheres,

rogai por nós pecadores,

    ref: "Lc 1,28.42"
  },
  "Glória ao Pai": {
    icon: "✨",
    intro: "Um louvor ao Pai, ao Filho e ao Espírito Santo — a Santíssima Trindade.",
    text: `Glória ao Pai, ao Filho e ao Espírito Santo,

    ref: "2Cor 13,13"
  },
  "Credo dos Apóstolos": {
    icon: "✝",
    intro: "A profissão de fé que resume o essencial do que cremos.",
    text: `Creio em Deus Pai todo-poderoso,
criador do céu e da terra.
Creio em Jesus Cristo, seu único Filho, nosso Senhor,

Subiu aos céus, está sentado à direita de Deus Pai todo-poderoso,

Creio no Espírito Santo,
na Santa Igreja,
na comunhão dos santos,
na remissão dos pecados,
na ressurreição da carne,

    ref: "1Cor 15,3-5 · Jo 3,16"

  "Ato de Contrição": {

Amém.`,
    ref: "Sl 51,3-4 · Lc 15,18"
  },
  "Salve Rainha": {
    icon: "🌸",
    intro: "Uma súplica à minha mãe, nossa intercessora.",
    text: `Salve, Rainha, Mãe de misericórdia,
vida, doçura e esperança nossa, salve!

a vós suspiramos, gemendo e chorando
neste vale de lágrimas.
Eia, pois, advogada nossa,
esses vossos olhos misericordiosos a nós volvei;
e depois deste desterro, mostrai-nos Jesus,
bendito fruto do vosso ventre.

    ref: "Lc 1,48"
  },
  "Anjo da Guarda": {
    icon: "🕊️",
    intro: "Uma oração de gratidão ao anjo que Eu enviei para proteger cada um de vós.",
    text: `Santo Anjo do Senhor,
meu zeloso guardador,
se a ti me confiou a piedade divina,
sempre me rege, guarda, governa e ilumina. Amém.`,
    ref: "Sl 91,11 · Mt 18,10"
  },
  "Oração de São Francisco": {
    icon: "🕊️",
    intro: "Uma oração de paz, belíssima em sua simplicidade.",
    text: `Senhor, fazei-me instrumento da vossa paz.
Onde houver ódio, que eu leve o amor;
onde houver ofensa, que eu leve o perdão;

function crossIcon(size=20, color='#C9923A') {
  const h = Math.round(size * 1.25);
  return `<svg width="${size}" height="${h}" viewBox="0 0 ${size} ${h}" fill="none">
    <rect x="${size*0.38}" y="0" width="${size*0.24}" height="${h}" rx="${size*0.12}" fill="${color}"/>
    <rect x="0" y="${h*0.28}" width="${size}" height="${size*0.24}" rx="${size*0.12}" fill="${color}"/>
  </svg>`;
}

function userInitials(name) {

function doLogin(e) {
  e.preventDefault();
  const email = document.getElementById('login-email').value;
  let role='user', name='Você', credits=FREE_CREDITS, plan='Gratuito';
  if(email==='admin@jesus.com'){role='admin';name='Administrador';credits=9999;plan='Admin';}
  else if(email==='super@jesus.com'){role='superadmin';name='Super Admin';credits=9999;plan='Super Admin';}
  S.user={name,email,role,credits,plan,creditUsed:0};
  if(role==='user')nav('onboarding');
  else if(role==='admin')nav('admin','dashboard');
  else nav('admin','super');
}

function doRegister(e) {
  e.preventDefault();
  const name=document.getElementById('reg-name').value;
  const email=document.getElementById('reg-email').value;
  S.user={name,email,role:'user',credits:FREE_CREDITS,plan:'Gratuito',creditUsed:0};
  nav('onboarding');
}

  guestAppendBubble('user',text);
  S.hist.push({role:'user',content:text});

    typing.id='guest-typing';typing.style.cssText='display:flex;gap:12px;align-items:flex-start';

    msgs.appendChild(typing);msgs.scrollTop=msgs.scrollHeight;
  }

  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json','x-api-key':'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','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1000,system:SYSTEM_PROMPT,messages:S.hist})

function guestAppendBubble(role,text){
  const msgs=document.getElementById('guest-msgs');
  if(!msgs)return;
  const isUser=role==='user';
  let main=text.trim(),ref='';
  if(!isUser){const lines=main.split('\n');const last=lines[lines.length-1].trim();if(/^[A-Z][a-z]{0,3}\s\d/.test(last)||/·/.test(last)){ref=lines.pop().trim();main=lines.join('\n').trim();}}
  const wrap=document.createElement('div');
  wrap.style.cssText=`display:flex;gap:12px;align-items:flex-start${isUser?';flex-direction:row-reverse':''}`;
  const avColor=isUser?'background:var(--blue-l);color:var(--blue);font-size:13px;font-weight:700':'background:var(--gold-l);border:1.5px solid rgba(201,146,58,0.3);overflow:hidden';

    <div style="max-width:80%;display:flex;flex-direction:column;gap:5px;${isUser?'align-items:flex-end':''}">

function guestToggleVoice(){
  if(!('webkitSpeechRecognition'in window||'SpeechRecognition'in window)){showToast('Voz não suportada neste navegador.');return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const r=new SR();r.lang='pt-BR';r.continuous=false;
  r.onresult=(ev)=>{const t=ev.results[0][0].transcript;const i=document.getElementById('guest-inp');if(i)i.value=t;};

  showToast('Ouvindo… fale agora');
}

function socialLogin(provider){
  // Simulate social auth
  const email=`usuario@${provider.toLowerCase()}.com`;
  const name=provider==='Google'?'Usuário Google':'Usuário Apple';
  S.user={name,email,role:'user',credits:FREE_CREDITS,plan:'Gratuito',creditUsed:0};
  S.hist=[];
  document.getElementById('signup-gate')?.remove();
  showToast(`Conectado com ${provider}`);
  setTimeout(()=>{S.obStep=0;nav('onboarding');},600);
}

function emailLogin(){
  const email=document.getElementById('gate-email')?.value?.trim();
  if(!email||!email.includes('@')){showToast('Digite um e-mail válido.');return;}
  let role='user',name='Você',credits=FREE_CREDITS,plan='Gratuito';
  if(email==='admin@jesus.com'){role='admin';name='Administrador';credits=9999;plan='Admin';}
  else if(email==='super@jesus.com'){role='superadmin';name='Super Admin';credits=9999;plan='Super Admin';}
  S.user={name,email,role,credits,plan,creditUsed:0};
  // Aplica upgrade pendente se pagou antes de criar conta
  if(localStorage.getItem('cj_pending_upgrade')==='true'){
    S.user.plan='Essencial'; S.user.credits=99999;
    localStorage.removeItem('cj_pending_upgrade');
    localStorage.setItem('cj_subscription',JSON.stringify({active:true,since:new Date().toISOString()}));
  }
  // Restaura assinatura existente
  const sub=localStorage.getItem('cj_subscription');
  if(sub){try{const d=JSON.parse(sub);if(d.active){S.user.plan='Essencial';S.user.credits=99999;}}catch(e){}}
  S.hist=[];
  document.getElementById('signup-gate')?.remove();
  showToast('Conta criada com sucesso!');
  if(role==='user')setTimeout(()=>{S.obStep=0;nav('onboarding');},600);
  else setTimeout(()=>nav('admin','dashboard'),600);
}

function getDailyTheme() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const diff = now - start;
  const dayOfYear = Math.floor(diff / (1000 * 60 * 60 * 24));
  return DAILY_THEMES[(dayOfYear - 1) % DAILY_THEMES.length];
}

function initChat(){
  S.conversations=[{id:1,title:'Nova conversa',date:new Date()}];
  S.activeConv=1;
  S.messages=[];S.hist=[];
  S.dailyLoaded=false;
  nav('chat');
  // Auto-load daily portion as opening message
  setTimeout(loadDailyPortion, 300);
}

async function loadDailyPortion(){
  if(S.dailyLoaded||S.busy) return;
  _doLoadDailyPortion();
}

async function _doLoadDailyPortion(){
  S.dailyLoaded=true;
  S.busy=true;

  // Show loading state in empty-chat area
  const emptyDiv=document.querySelector('.empty-chat');
  if(emptyDiv){
    const loader=document.createElement('div');
    loader.id='daily-loader';
    loader.style.cssText='display:flex;gap:6px;align-items:center;margin-top:16px;font-size:13px;color:var(--text3)';
    loader.innerHTML=`<div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div> <span>Preparando a porção de hoje…</span>`;
    emptyDiv.appendChild(loader);
  }

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json','x-api-key':'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','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:600,
        system:SYSTEM_PROMPT,
        messages:[{role:'user',content:DAILY_PORTION_PROMPT}]
      })
    });
    const data=await res.json();
    const text=data.content?.[0]?.text;
    if(!text) throw new Error('empty');

    // Render the daily portion as first message
    document.getElementById('daily-loader')?.remove();
    const main=document.querySelector('.chat-main');
    const emptyD=main?.querySelector('.empty-chat');
    if(emptyD){
      emptyD.outerHTML=`<div class="messages-area" id="msgs"></div>`;
    }
    // Add as assistant message with special daily marker
    S.messages.push({role:'assistant',content:text,isDaily:true});
    S.hist.push({role:'assistant',content:text});
    const msgs=document.getElementById('msgs');
    if(msgs){
      const div=document.createElement('div');
      div.innerHTML=renderDailyMsg(text);
      msgs.appendChild(div.firstElementChild);
      msgs.scrollTop=msgs.scrollHeight;
    }
  }catch(e){
    document.getElementById('daily-loader')?.remove();
  }
  S.busy=false;
  document.getElementById('chat-inp')?.focus();
}

function renderDailyMsg(text){
  let main=text.trim(), ref='';
  const lines=main.split('\n');
  const last=lines[lines.length-1].trim();
  if(/^[A-Z][a-z]{0,3}\s\d/.test(last)||/·/.test(last)){
    ref=lines.pop().trim(); main=lines.join('\n').trim();
  }
  const today=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
  const theme=getDailyTheme();
  return `
  <div class="msg-row" style="margin-bottom:8px">
    <div class="msg-av msg-av-j" style="overflow:hidden;padding:0"><div class="av-jesus-img"></div></div>
    <div class="msg-content" style="max-width:86%">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:0 2px">
        <div style="height:1px;flex:1;background:linear-gradient(to right,var(--gold),transparent)"></div>
        <span style="font-size:10px;font-weight:700;color:var(--gold-d);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap">Porção de hoje · ${today}</span>
        <div style="height:1px;flex:1;background:linear-gradient(to left,var(--gold),transparent)"></div>
      </div>
      <div style="padding:18px 20px;border-radius:18px;border-top-left-radius:4px;background:linear-gradient(135deg,#FDFAF4,#F8F5EF);border:1px solid rgba(201,146,58,0.18);font-family:Georgia,serif;font-size:15px;line-height:1.85;color:var(--text);box-shadow:0 2px 16px rgba(201,146,58,0.08);white-space:pre-wrap">${escHtml(main)}</div>
      ${ref?`<div class="bubble-ref">${escHtml(ref)}</div>`:''}
      <div class="msg-actions">
        <button class="msg-act-btn" onclick="copyText('${encodeURIComponent(text)}')">Copiar</button>
        <button class="msg-act-btn" onclick="speakText('${encodeURIComponent(text)}')">Ouvir</button>
        <button class="msg-act-btn" style="color:var(--blue)" onclick="sendSuggestion('Quero conversar mais sobre esta porção de hoje: ${encodeURIComponent(theme)}')">Conversar sobre isso</button>
      </div>
    </div>
  </div>`;
}

function renderMsg(m) {
  const isUser=m.role==='user';
  let main=m.content.trim(), ref='';
  if(!isUser){
    const lines=main.split('\n');
    const last=lines[lines.length-1].trim();
    if(/^[A-Z][a-z]{0,3}\s\d/.test(last)||/·/.test(last)){
      ref=lines.pop().trim();main=lines.join('\n').trim();
    }
  }
  return `
  <div class="msg-row ${isUser?'user':''}">
    <div class="msg-av ${isUser?'msg-av-u':'msg-av-j'}">
      ${isUser?userInitials(S.user?.name||'V'):'<div class="av-jesus-img"></div>'}
    </div>
    <div class="msg-content">
      <div class="bubble ${isUser?'bubble-u':'bubble-j'}">${escHtml(main)}</div>
      ${ref?`<div class="bubble-ref">${escHtml(ref)}</div>`:''}
      ${!isUser?`
      <div class="msg-actions">
        <button class="msg-act-btn" onclick="copyText('${encodeURIComponent(main)}')">Copiar</button>
        <button class="msg-act-btn" onclick="speakText('${encodeURIComponent(main)}')">Ouvir</button>
      </div>`:''}
    </div>
  </div>`;
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'\n'); }

function appendMsg(m){
  S.messages.push(m);
  const area=document.getElementById('msgs');
  if(!area){render();return;}
  const div=document.createElement('div');
  div.innerHTML=renderMsg(m);
  area.appendChild(div.firstElementChild);
  area.scrollTop=area.scrollHeight;
}

function showTyping(){
  const area=document.getElementById('msgs');
  if(!area)return;
  const div=document.createElement('div');
  div.id='typing';div.className='typing-wrap';
  div.innerHTML=`<div class="msg-av msg-av-j"><div class="av-jesus-img"></div></div><div class="typing-bubble"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div>`;
  area.appendChild(div);area.scrollTop=area.scrollHeight;
}
function removeTyping(){document.getElementById('typing')?.remove();}

async function sendMessage(){
  if(S.busy)return;
  const inp=document.getElementById('chat-inp');
  const text=inp?.value?.trim();
  if(!text)return;
  

  if(S.user&&S.user.credits<=0&&S.user.plan==='Gratuito'){
    showCreditsModal();return;
  }

  inp.value='';inp.style.height='';
  S.busy=true;
  if(document.getElementById('send-btn'))document.getElementById('send-btn').disabled=true;

  // First message = render messages area
  if(S.messages.length===0){
    S.conversations[0].title=text.slice(0,40)+(text.length>40?'...':'');
    const main=document.querySelector('.chat-main');
    if(main){
      const emptyDiv=main.querySelector('.empty-chat');
      if(emptyDiv){
        emptyDiv.outerHTML=`<div class="messages-area" id="msgs"></div>`;
      }
    }
  }

  appendMsg({role:'user',content:text});
  S.hist.push({role:'user',content:text});
  showTyping();

  if(S.user)S.user.credits=Math.max(0,S.user.credits-1);

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json','x-api-key':'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','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1000,system:SYSTEM_PROMPT,messages:S.hist})
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const reply=data.content?.[0]?.text;
    if(!reply)throw new Error('Sem resposta');
    S.hist.push({role:'assistant',content:reply});
    removeTyping();appendMsg({role:'assistant',content:reply});
    updateCreditsBar();
  }catch(e){
    removeTyping();
    appendMsg({role:'assistant',content:`Não consegui receber a resposta agora. Tente novamente em instantes.\n\n"Pedi e vos será dado." — Mt 7,7`});
  }

  S.busy=false;
  if(document.getElementById('send-btn'))document.getElementById('send-btn').disabled=false;
  document.getElementById('chat-inp')?.focus();
}

function updateCreditsBar(){
  const u=S.user;if(!u)return;
  const fill=document.querySelector('.credits-fill');
  const label=document.querySelector('.credits-label strong');
  if(fill){const pct=Math.max(0,(u.credits/FREE_CREDITS)*100);fill.style.width=pct+'%';if(u.credits<=3)fill.classList.add('low');}
  if(label)label.textContent=u.credits;
}

function sendSuggestion(text){
  const inp=document.getElementById('chat-inp');
  if(inp){inp.value=text;sendMessage();}
  else{S.messages=[];S.hist=[];render();setTimeout(()=>{const i=document.getElementById('chat-inp');if(i){i.value=text;sendMessage();}},100);}
}

function chatKeydown(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}

function copyText(encoded){
  navigator.clipboard.writeText(decodeURIComponent(encoded)).then(()=>showToast('Resposta copiada!'));
}
function speakText(encoded){
  const text=decodeURIComponent(encoded);
  const utt=new SpeechSynthesisUtterance(text);
  utt.lang='pt-BR';utt.rate=0.92;speechSynthesis.speak(utt);
}

let recognizer=null;
function toggleVoice(){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){
    showToast('Voz não suportada neste navegador.');return;
  }
  if(S.recording){
    recognizer?.stop();S.recording=false;
    const btn=document.getElementById('mic-btn');
    if(btn){btn.classList.remove('recording');btn.textContent='🎙';}
    return;
  }
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognizer=new SR();recognizer.lang='pt-BR';recognizer.continuous=false;
  S.recording=true;
  const btn=document.getElementById('mic-btn');
  if(btn){btn.classList.add('recording');btn.textContent='⏹';}
  recognizer.onresult=(ev)=>{
    const t=ev.results[0][0].transcript;
    const inp=document.getElementById('chat-inp');
    if(inp)inp.value=t;
  };
  recognizer.onend=()=>{
    S.recording=false;
    const btn=document.getElementById('mic-btn');
    if(btn){btn.classList.remove('recording');btn.textContent='🎙';}
  };
  recognizer.start();
}

  const el=document.createElement('div');
  el.className='modal-overlay credits-upgrade-modal';

let toastTimer;
function showToast(msg){
  let el=document.getElementById('toast');
  if(!el){
    el=document.createElement('div');el.id='toast';
    el.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#3C3A36;color:#fff;padding:12px 24px;border-radius:var(--rl);font-size:14px;z-index:9999;box-shadow:var(--sh2);transition:opacity .3s;white-space:nowrap';
    document.body.appendChild(el);
  }
  el.textContent=msg;el.style.opacity='1';
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>{el.style.opacity='0';},2800);
}

  const items=document.querySelectorAll('.faq-item');

}

function checkPaymentReturn(){
  const params = new URLSearchParams(window.location.search);
  if(params.get('pago') !== 'sim') return;

  // Limpa a URL
  window.history.replaceState({}, document.title, window.location.pathname);

  // Libera acesso
  const sub = { active:true, since: new Date().toISOString() };
  localStorage.setItem('cj_subscription', JSON.stringify(sub));

  if(S.user){
    S.user.plan = 'Essencial';
    S.user.credits = 99999;
  } else {
    // Salva para quando fizer login
    localStorage.setItem('cj_pending_upgrade', 'true');
  }

  // Mostra boas-vindas espiritual
  showPaymentWelcome();
}
